<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carrinho - SStema</title>

        <link rel="shortcut icon" href="../imagens/logo.png" type="image/png">
        <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
        <link rel="stylesheet" href="../css/style_carrinho.css">
    </head>
<body>

    <main id="geral">

        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../imagens/logo.png" alt="Logo SStema">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu">Loja</a></li>
                    <li><a href="biblioteca.html" class="lnk_menu">Biblioteca</a></li>
                    <li><a href="sobre.html" class="lnk_menu">Sobre</a></li>
                </ul>
            </nav>

            <div id="icones">
                <ul>
                    <li><a href="login.html"><img src="../icones/login.png" alt="Login"></a></li>
                    <li><a href="carrinho.html"><img src="../icones/carrinho.png" alt="Carrinho"></a></li>
                </ul>
            </div>
        </header>

        <section id="carrinho-conteudo">

            <div class="conteudo_interno">

                <h1 class="titulo_pagina">Meu Carrinho</h1>

                <div id="lista-carrinho"></div>

                <p id="carrinho-vazio" style="display: none;">
                    Seu carrinho está vazio.
                </p>

                <div id="resumo_compra">
                    <h2>Total: <span id="valor-total">R$ 0,00</span></h2>
                    <button class="btn_finalizar" id="btn-finalizar">Finalizar Compra</button>
                </div>

            </div>

        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>loja Online</h2>
            </div>
            <div id="icones_sociais"></div>
            <div id="div-cartoes">
                <img src="../icones/hipercard.png" alt="Hipercard">
                <img src="../icones/visa.png" alt="Visa">
                <img src="../icones/master_card.png" alt="MasterCard">
            </div>
        </footer>

    </main>

    <script type="module" src="../js/carrega_carrinho.js"></script>
</body>
</html>
